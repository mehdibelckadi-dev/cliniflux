<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Acceso — Cliniflux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--green:#16a34a;--green-dim:rgba(22,163,74,0.08);--text:#0f172a;--text2:rgba(15,23,42,0.6);--border:rgba(0,0,0,0.1);--red:#dc2626}
    body{font-family:'Inter',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
    .card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 4px 40px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.05)}
    .logo{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.8px;margin-bottom:6px}
    .logo span{color:var(--green)}
    .subtitle{font-size:13px;color:var(--text2);margin-bottom:28px}
    label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
    input{width:100%;font-family:inherit;font-size:14px;color:var(--text);background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;outline:none;transition:border-color .2s;margin-bottom:14px}
    input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-dim)}
    .btn{width:100%;font-family:inherit;font-size:15px;font-weight:700;color:#fff;background:var(--green);border:none;padding:12px;border-radius:40px;cursor:pointer;transition:background .2s;margin-top:4px}
    .btn:hover{background:#15803d}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .error{font-size:13px;color:var(--red);background:#fef2f2;border:1px solid rgba(220,38,38,0.2);border-radius:8px;padding:9px 12px;margin-bottom:14px;display:none}
    .back{display:block;text-align:center;font-size:12px;color:var(--text2);margin-top:18px;text-decoration:none}
    .back:hover{color:var(--text)}
    .demo-hint{font-size:11px;color:var(--text2);background:#f8f9fb;border:1px solid rgba(0,0,0,0.07);border-radius:8px;padding:9px 12px;margin-top:16px;text-align:center;line-height:1.5}
    .demo-hint strong{color:var(--text)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">clini<span>flux</span></div>
    <div class="subtitle">Accede a tu panel de control</div>
    <div class="error" id="err"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" id="btn" onclick="login()">Entrar →</button>
    <div class="demo-hint">
      Demo: <strong>demo@cliniflux.com</strong> / <strong>demo1234</strong>
    </div>
    <a href="/" class="back">← Volver a cliniflux.com</a>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('pass').value;
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      err.style.display = 'none';
      if (!email || !pass) { err.textContent = 'Introduce email y contraseña.'; err.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const r = await fetch('/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email, password: pass }) });
        const data = await r.json();
        if (r.ok) { window.location.href = '/dashboard'; }
        else { err.textContent = data.error || 'Error al iniciar sesión.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Entrar →'; }
      } catch { err.textContent = 'Error de conexión.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Entrar →'; }
    }
  </script>
</body>
</html>
